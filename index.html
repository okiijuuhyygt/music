<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>陳則皞 — 作品</title>
<style>
:root{--bg:#0f0d12;--ink:#ece5da;--dim:#8d8496;--edge:#2c2733}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC","PingFang TC",sans-serif;
  max-width:560px;margin:0 auto;padding:48px 20px 60px}
h1{font-size:22px;letter-spacing:.3em;text-align:center;margin-bottom:6px}
.sub{text-align:center;color:var(--dim);font-size:12px;letter-spacing:.15em;margin-bottom:32px}
a.card{display:flex;gap:14px;align-items:center;text-decoration:none;color:var(--ink);
  border:1px solid var(--edge);border-radius:14px;padding:12px;margin-bottom:14px;transition:.15s;background:rgba(255,255,255,.02)}
a.card:hover{border-color:var(--dim)}
.cv{width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0}
.meta{min-width:0}
.t{font-size:15px;line-height:1.5;font-weight:600}
.a{font-size:12px;color:var(--dim);margin-top:4px}
.d{font-size:11px;color:var(--dim);margin-top:2px}
footer{text-align:center;color:var(--dim);font-size:11px;margin-top:36px;letter-spacing:.1em}
</style>
<script data-goatcounter="https://haohao.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<h1>陳則皞</h1>
<div class="sub">DISCOGRAPHY</div>
<div id="list"></div>
<footer>陳則皞 · 巷弄故事館</footer>
<script>
const ref=new URLSearchParams(location.search).get('ref');
fetch('songs.json').then(r=>r.json()).then(d=>{
  document.getElementById('list').innerHTML=d.songs.map(s=>{
    const url=s.url+(ref?((s.url.includes('?')?'&':'?')+'ref='+encodeURIComponent(ref)):'');
    return `<a class="card" href="${url}"><img class="cv" src="${s.cover}" alt="">`+
      `<div class="meta"><div class="t">${s.title}</div><div class="a">${s.artist}</div><div class="d">${s.date}</div></div></a>`;
  }).join('');
});
</script>
</body></html>
